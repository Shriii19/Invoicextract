<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvoiceXtract</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        InvoiceXtract
      </div>
      <span class="header-sub">Offline PDF Invoice Parser</span>
    </div>
  </header>

  <main>
    <!-- Upload Section -->
    <section class="upload-section" id="uploadSection">
      <div class="upload-card">
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-title">Drop your invoice here</p>
          <p class="drop-sub">PDF, PNG, JPG, TIFF supported</p>
          <label class="browse-btn">
            Browse File
            <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.tiff" hidden />
          </label>
        </div>

        <div class="file-selected hidden" id="fileSelected">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="fileName">file.pdf</span>
          <button class="clear-btn" id="clearBtn" title="Remove file">&#x2715;</button>
        </div>

        <button class="extract-btn" id="extractBtn" disabled>
          <span id="btnText">Extract Invoice Data</span>
          <span id="btnSpinner" class="spinner hidden"></span>
        </button>

        <div class="error-box hidden" id="errorBox"></div>
      </div>
    </section>

    <!-- Results Section -->
    <section class="results-section hidden" id="resultsSection">

      <!-- Top bar: invoice number + validity + downloads -->
      <div class="results-header">
        <div>
          <div class="invoice-num" id="invoiceNum">Invoice #—</div>
          <div class="badge-row">
            <span class="badge" id="validBadge">—</span>
            <span class="extracted-time" id="extractedTime"></span>
          </div>
        </div>
        <div class="download-group">
          <span class="download-label">Download as</span>
          <button class="dl-btn" id="dlCsv">CSV</button>
          <button class="dl-btn" id="dlExcel">Excel</button>
          <button class="dl-btn" id="dlJson">JSON</button>
          <button class="new-btn" id="newBtn">+ New Invoice</button>
        </div>
      </div>

      <!-- Dates row -->
      <div class="info-grid two-col">
        <div class="info-card">
          <div class="card-label">Invoice Date</div>
          <div class="card-value" id="invoiceDate">—</div>
        </div>
        <div class="info-card">
          <div class="card-label">Due Date</div>
          <div class="card-value" id="dueDate">—</div>
        </div>
      </div>

      <!-- Vendor / Customer -->
      <div class="info-grid two-col">
        <div class="info-card">
          <div class="card-label">Vendor</div>
          <div class="card-value" id="vendorName">—</div>
          <div class="card-detail" id="vendorEmail"></div>
          <div class="card-detail" id="vendorPhone"></div>
          <div class="card-detail addr" id="vendorAddress"></div>
        </div>
        <div class="info-card">
          <div class="card-label">Bill To</div>
          <div class="card-value" id="customerName">—</div>
          <div class="card-detail addr" id="customerAddress"></div>
        </div>
      </div>

      <!-- Amounts -->
      <div class="info-grid three-col">
        <div class="info-card amount-card">
          <div class="card-label">Subtotal</div>
          <div class="card-value amount" id="subtotal">—</div>
        </div>
        <div class="info-card amount-card">
          <div class="card-label">Tax</div>
          <div class="card-value amount" id="taxAmount">—</div>
        </div>
        <div class="info-card amount-card total-card">
          <div class="card-label">Total</div>
          <div class="card-value amount total-amount" id="totalAmount">—</div>
        </div>
      </div>

      <!-- Payment terms -->
      <div class="info-grid one-col" id="paymentRow">
        <div class="info-card">
          <div class="card-label">Payment Terms</div>
          <div class="card-value" id="paymentTerms">—</div>
        </div>
      </div>

      <!-- Line Items -->
      <div class="line-items-section" id="lineItemsSection">
        <div class="section-title">Line Items</div>
        <table class="line-items-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Description</th>
              <th class="right">Qty</th>
              <th class="right">Unit Price</th>
              <th class="right">Amount</th>
            </tr>
          </thead>
          <tbody id="lineItemsBody"></tbody>
        </table>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
